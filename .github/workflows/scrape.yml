name: Scrape Data

on:
  workflow_dispatch:
    inputs:
      float_max:
        description: 'Float Max (shares, e.g. 5000000)'
        required: false
        default: '5000000'
      price_min:
        description: 'Price Min (e.g. 0.8)'
        required: false
        default: '0.8'
      price_max:
        description: 'Price Max (e.g. 6)'
        required: false
        default: '6'
      avail_max:
        description: 'Available Shares Max (e.g. 100000)'
        required: false
        default: '100000'
      borrow_min:
        description: 'Min Borrow Rate % (e.g. 0)'
        required: false
        default: '0'
  schedule:
    - cron: "0 14 * * 1-5"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          FILTER_FLOAT_MAX:  ${{ github.event.inputs.float_max  || '5000000' }}
          FILTER_PRICE_MIN:  ${{ github.event.inputs.price_min  || '0.8' }}
          FILTER_PRICE_MAX:  ${{ github.event.inputs.price_max  || '6' }}
          FILTER_AVAIL_MAX:  ${{ github.event.inputs.avail_max  || '100000' }}
          FILTER_BORROW_MIN: ${{ github.event.inputs.borrow_min || '0' }}
        run: python scraper.py

      - name: Commit data.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data.json
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "data: update $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
